<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阅读页面 - 小汤圆的快乐小屋</title>
    <style>
      /* 全局基础样式 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        border: none !important;
      }
      body {
        background-color: #f9f7f8;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        display: flex;
        height: 100vh;
        transition: background-color 0.3s ease;
      }
      /* 侧边栏（同首页） */
      .cebian {
        width: 200px;
        background-color: #ffffff;
        border: 1px solid #e8e2e9 !important;
        border-radius: 12px !important;
        margin: 10px;
        padding: 16px;
        box-shadow: rgba(146, 119, 161, 0.08) 0px 2px 8px !important;
      }
      .avatar-box {
        display: flex;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid #e8e2e9 !important;
        margin-bottom: 16px;
      }
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        background-color: #f3edf7;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7c3aed;
        font-size: 18px;
      }
      .nickname {
        margin-left: 12px;
        font-size: 18px;
        color: #5a4b60;
        font-weight: 500;
      }
      .nav-list {
        list-style: none;
      }
      .nav-item {
        margin-bottom: 8px;
      }
      .nav-link {
        display: block;
        padding: 12px 16px;
        text-decoration: none;
        color: #5a4b60;
        font-size: 16px;
        border-radius: 8px !important;
        text-align: center;
        transition: all 0.2s ease;
      }
      .nav-link.active {
        background-color: #ede9fe !important;
        color: #7c3aed !important;
        font-weight: 500;
      }
      .nav-link:hover {
        background-color: #f3edf7 !important;
        color: #8b5cf6 !important;
      }
      /* 阅读区容器 */
      .read-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 10px;
      }
      /* 阅读区 */
      .read-content {
        width: 100%;
        max-width: 800px;
        padding: 32px;
        background-color: #ffffff;
        border: 1px solid #e8e2e9 !important;
        border-radius: 12px !important;
        box-shadow: rgba(146, 119, 161, 0.08) 0px 2px 8px !important;
        overflow-y: auto;
        max-height: calc(100vh - 20px);
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      /* 阅读主题样式 */
      .read-content.theme-white {
        background-color: #ffffff;
        color: #4a3f4d;
      }
      .read-content.theme-yellow {
        background-color: #fef9e7;
        color: #5b4b3e;
      }
      .read-content.theme-night {
        background-color: #2c2c2c;
        color: #e0e0e0;
      }
      .book-title {
        font-size: 32px;
        color: #7c3aed;
        text-align: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid #e8e2e9 !important;
        transition: color 0.3s ease;
      }
      .theme-night .book-title {
        color: #a78bfa;
        border-bottom-color: #444 !important;
      }
      /* 阅读工具栏 */
      .read-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 8px 16px;
        background: #f3edf7;
        border-radius: 8px;
        transition: background-color 0.3s ease;
      }
      .theme-night .read-toolbar {
        background: #3a3a3a;
      }
      .back-btn {
        color: #7c3aed;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s ease;
      }
      .theme-night .back-btn {
        color: #a78bfa;
      }
      .tool-group {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .font-size {
        display: flex;
        gap: 8px;
      }
      .font-btn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: #ede9fe;
        color: #7c3aed;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      .theme-night .font-btn {
        background-color: #444;
        color: #a78bfa;
      }
      /* 主题切换按钮 */
      .theme-btn {
        padding: 4px 8px;
        border-radius: 4px;
        background-color: #ede9fe;
        color: #7c3aed;
        cursor: pointer;
        font-size: 12px;
        transition: background-color 0.3s ease;
      }
      .theme-night .theme-btn {
        background-color: #444;
        color: #a78bfa;
      }
      /* 目录按钮 */
      .catalog-btn {
        padding: 4px 8px;
        border-radius: 4px;
        background-color: #ede9fe;
        color: #7c3aed;
        cursor: pointer;
        font-size: 12px;
        transition: background-color 0.3s ease;
      }
      .theme-night .catalog-btn {
        background-color: #444;
        color: #a78bfa;
      }
      /* 正文样式 */
      .book-content {
        font-size: 18px;
        line-height: 2.2;
        color: #4a3f4d;
        text-indent: 2em;
        margin-bottom: 32px;
        transition:
          font-size 0.2s ease,
          color 0.3s ease,
          line-height 0.2s ease;
      }
      .theme-night .book-content {
        color: #e0e0e0;
      }
      /* 加载/空内容样式 */
      .loading-content,
      .empty-content {
        text-align: center;
        padding: 40px;
        color: #917899;
        font-size: 16px;
      }
      .theme-night .loading-content,
      .theme-night .empty-content {
        color: #aaa;
      }
      /* 章节导航 */
      .chapter-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
        padding-top: 16px;
        border-top: 1px solid #e8e2e9 !important;
        transition: border-color 0.3s ease;
      }
      .theme-night .chapter-nav {
        border-top-color: #444 !important;
      }
      .chapter-btn {
        padding: 8px 20px;
        background-color: #7c3aed;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        transition: background-color 0.2s ease;
        cursor: pointer;
        border: none;
      }
      .chapter-btn:disabled,
      .chapter-btn.disabled {
        background-color: #917899;
        cursor: not-allowed;
      }
      .theme-night .chapter-btn {
        background-color: #8b5cf6;
      }
      .theme-night .chapter-btn.disabled {
        background-color: #555;
      }
      /* 目录弹窗 */
      .catalog-modal {
        position: fixed;
        top: 0;
        right: 0;
        width: 300px;
        height: 100vh;
        background-color: #fff;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        overflow-y: auto;
        padding: 20px;
      }
      .theme-night .catalog-modal {
        background-color: #333;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.3);
      }
      .catalog-modal.show {
        transform: translateX(0);
      }
      .catalog-title {
        font-size: 20px;
        color: #7c3aed;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e8e2e9 !important;
      }
      .theme-night .catalog-title {
        color: #a78bfa;
        border-bottom-color: #444 !important;
      }
      .catalog-list {
        list-style: none;
      }
      .catalog-item {
        padding: 8px 0;
        border-bottom: 1px dashed #eee !important;
      }
      .theme-night .catalog-item {
        border-bottom-color: #444 !important;
      }
      .catalog-link {
        color: #5a4b60;
        text-decoration: none;
        font-size: 14px;
        display: block;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s ease;
      }
      .theme-night .catalog-link {
        color: #ddd;
      }
      .catalog-link:hover,
      .catalog-link.active {
        background-color: #f3edf7;
        color: #7c3aed;
      }
      .theme-night .catalog-link:hover,
      .theme-night .catalog-link.active {
        background-color: #444;
        color: #a78bfa;
      }
      .close-catalog {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        color: #917899;
        font-size: 20px;
        cursor: pointer;
      }
      .theme-night .close-catalog {
        color: #aaa;
      }
      /* 进度提示 */
      .progress-tip {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 12px;
        display: none;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <!-- 侧边栏 -->
    <div class="cebian">
      <div class="avatar-box">
        <div class="avatar">汤</div>
        <div class="nickname">小汤圆</div>
      </div>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="../index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="../novel/novel.html" class="nav-link active">小说</a>
        </li>
        <li class="nav-item">
          <a href="../anime/anime.html" class="nav-link">动漫</a>
        </li>
        <li class="nav-item">
          <a href="../video/video.html" class="nav-link">视频</a>
        </li>
        <li class="nav-item">
          <a href="../music/music.html" class="nav-link">音乐</a>
        </li>
      </ul>
    </div>

    <!-- 阅读主容器 -->
    <div class="read-container">
      <!-- 阅读区 -->
      <div class="read-content theme-white" id="readContent">
        <h1 class="book-title" id="bookTitle">《加载中...》</h1>

        <div class="read-toolbar">
          <a href="../novel/novel.html" class="back-btn">← 返回小说列表</a>
          <div class="tool-group">
            <div class="font-size">
              <button class="font-btn" onclick="changeFontSize(-1)">-</button>
              <button class="font-btn" onclick="changeFontSize(1)">+</button>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">切换主题</button>
            <button class="catalog-btn" onclick="showCatalog()">目录</button>
          </div>
        </div>

        <!-- 小说内容区 -->
        <div class="book-content" id="bookContent">
          <div class="loading-content">正在加载小说内容...</div>
        </div>

        <div class="chapter-nav">
          <button
            class="chapter-btn disabled"
            id="prevChapterBtn"
            onclick="switchChapter(-1)"
          >
            上一章
          </button>
          <button
            class="chapter-btn disabled"
            id="nextChapterBtn"
            onclick="switchChapter(1)"
          >
            下一章
          </button>
        </div>
      </div>
    </div>

    <!-- 目录弹窗 -->
    <div class="catalog-modal" id="catalogModal">
      <button class="close-catalog" onclick="hideCatalog()">×</button>
      <h3 class="catalog-title">小说目录</h3>
      <ul class="catalog-list" id="catalogList">
        <li class="catalog-item"><div class="catalog-link">加载中...</div></li>
      </ul>
    </div>

    <!-- 进度提示 -->
    <div class="progress-tip" id="progressTip">已阅读至 50%</div>

    <script>
      // 核心变量
      let currentFontSize = 18;
      let currentTheme = "white"; // white / yellow / night
      let currentBookId = "";
      let currentChapter = 0;
      let bookContent = "";
      let chapters = [];
      let bookTitle = ""; // 新增：存储手动输入的小说标题
      const contentEl = document.getElementById("bookContent");
      const titleEl = document.getElementById("bookTitle");
      const readContentEl = document.getElementById("readContent");
      const catalogModalEl = document.getElementById("catalogModal");
      const catalogListEl = document.getElementById("catalogList");
      const prevChapterBtn = document.getElementById("prevChapterBtn");
      const nextChapterBtn = document.getElementById("nextChapterBtn");
      const progressTipEl = document.getElementById("progressTip");
      const API_BASE = "http://localhost:5000/api/novel";

      // 页面加载初始化
      window.onload = initReader;

      // 初始化阅读器
      async function initReader() {
        // 获取URL中的小说ID
        const urlParams = new URLSearchParams(window.location.search);
        currentBookId = urlParams.get("book");

        if (!currentBookId) {
          titleEl.textContent = "《无效的小说ID》";
          contentEl.innerHTML =
            '<div class="empty-content">❌ 未找到指定的小说</div>';
          return;
        }

        // 加载小说内容
        await loadNovelContent();

        // 恢复阅读进度
        restoreReadingProgress();

        // 监听滚动事件（记录阅读进度）
        contentEl.parentElement.addEventListener(
          "scroll",
          debounce(recordReadingProgress, 500),
        );

        // 支持键盘翻页（左右方向键）
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft") {
            switchChapter(-1);
          } else if (e.key === "ArrowRight") {
            switchChapter(1);
          }
        });
      }

      // 加载小说内容（核心修改：改用手动标题）
      async function loadNovelContent() {
        try {
          const res = await fetch(`${API_BASE}/content/${currentBookId}`);
          const result = await res.json();

          if (result.success) {
            // 核心修改：优先使用手动输入的title，兼容旧数据
            bookTitle =
              result.data.title || result.data.filename.replace(".txt", "");
            // 设置页面标题和阅读页标题
            document.title = `${bookTitle} - 小汤圆的快乐小屋`;
            titleEl.textContent = `《${bookTitle}》`;

            // 保存原始内容并分割章节
            bookContent = result.data.content;
            splitChapters();

            // 渲染当前章节
            renderChapter(currentChapter);

            // 生成目录
            generateCatalog();

            // 恢复主题设置
            restoreThemeSetting();
          } else {
            titleEl.textContent = "《加载失败》";
            contentEl.innerHTML = `<div class="empty-content">❌ ${result.message}</div>`;
          }
        } catch (err) {
          titleEl.textContent = "《加载失败》";
          contentEl.innerHTML = `<div class="empty-content">❌ 网络错误：${err.message}</div>`;
        }
      }

      // 分割章节（按常见的章节标题分割）
      function splitChapters() {
        // 章节分割正则（匹配第X章、第一章、章节名等）
        const chapterRegex = /(第[\u4e00-\u9fa50-9]+章|章节|【.*】)/g;
        const contentArr = bookContent.split(chapterRegex);

        // 过滤空内容，生成章节列表
        chapters = [];
        let currentChapterContent = "";

        for (let i = 0; i < contentArr.length; i++) {
          const part = contentArr[i].trim();
          if (!part) continue;

          // 如果是章节标题
          if (chapterRegex.test(part)) {
            if (currentChapterContent) {
              chapters.push(currentChapterContent);
            }
            currentChapterContent = part + "\n";
          } else {
            currentChapterContent += part + "\n";
          }
        }

        // 添加最后一章
        if (currentChapterContent) {
          chapters.push(currentChapterContent);
        }

        // 如果没有分割出章节，整本书作为一章
        if (chapters.length === 0) {
          chapters = [bookContent];
        }

        // 更新章节按钮状态
        updateChapterBtnStatus();
      }

      // 渲染章节内容
      function renderChapter(chapterIndex) {
        if (chapterIndex < 0 || chapterIndex >= chapters.length) return;

        // 更新当前章节索引
        currentChapter = chapterIndex;

        // 渲染内容（转换换行符为<p>标签）
        const chapterContent = chapters[currentChapter];
        const paragraphs = chapterContent.split("\n").filter((p) => p.trim());
        let html = "";

        paragraphs.forEach((p) => {
          // 章节标题不加缩进
          if (/^第[\u4e00-\u9fa50-9]+章|章节|【.*】/.test(p)) {
            html += `<h4 style="text-align:center; margin: 20px 0; color: #7c3aed;">${p}</h4>`;
          } else {
            html += `<p>${p}</p>`;
          }
        });

        contentEl.innerHTML = html;

        // 更新章节按钮状态
        updateChapterBtnStatus();

        // 更新目录激活状态
        updateCatalogActive();

        // 滚动到顶部
        contentEl.parentElement.scrollTop = 0;
      }

      // 切换章节
      function switchChapter(delta) {
        const newChapterIndex = currentChapter + delta;

        if (newChapterIndex >= 0 && newChapterIndex < chapters.length) {
          renderChapter(newChapterIndex);
          // 显示切换提示
          showProgressTip(
            `已切换至 ${newChapterIndex + 1}/${chapters.length} 章`,
          );
        }
      }

      // 更新章节按钮状态
      function updateChapterBtnStatus() {
        // 上一章按钮
        if (currentChapter <= 0) {
          prevChapterBtn.classList.add("disabled");
          prevChapterBtn.disabled = true;
        } else {
          prevChapterBtn.classList.remove("disabled");
          prevChapterBtn.disabled = false;
        }

        // 下一章按钮
        if (currentChapter >= chapters.length - 1) {
          nextChapterBtn.classList.add("disabled");
          nextChapterBtn.disabled = true;
        } else {
          nextChapterBtn.classList.remove("disabled");
          nextChapterBtn.disabled = false;
        }
      }

      // 生成目录
      function generateCatalog() {
        catalogListEl.innerHTML = "";

        if (chapters.length === 0) {
          catalogListEl.innerHTML =
            '<li class="catalog-item"><div class="catalog-link">暂无章节</div></li>';
          return;
        }

        chapters.forEach((chapter, index) => {
          // 提取章节标题
          let chapterTitle = `第${index + 1}章`;
          const titleMatch = chapter.match(
            /(第[\u4e00-\u9fa50-9]+章|章节|【.*】)/,
          );
          if (titleMatch) {
            chapterTitle = titleMatch[0];
          }

          // 创建目录项
          const li = document.createElement("li");
          li.className = "catalog-item";

          const a = document.createElement("a");
          a.className = `catalog-link ${index === currentChapter ? "active" : ""}`;
          a.href = "javascript:void(0)";
          a.textContent = chapterTitle;
          a.onclick = () => {
            renderChapter(index);
            hideCatalog();
            showProgressTip(`已切换至 ${index + 1}/${chapters.length} 章`);
          };

          li.appendChild(a);
          catalogListEl.appendChild(li);
        });
      }

      // 更新目录激活状态
      function updateCatalogActive() {
        const catalogItems = catalogListEl.querySelectorAll(".catalog-link");
        catalogItems.forEach((item, index) => {
          if (index === currentChapter) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });
      }

      // 字体大小调整
      function changeFontSize(delta) {
        currentFontSize = Math.max(14, Math.min(28, currentFontSize + delta));
        contentEl.style.fontSize = `${currentFontSize}px`;
        // 保存字体大小设置
        localStorage.setItem(
          `novel_fontsize_${currentBookId}`,
          currentFontSize,
        );
      }

      // 切换阅读主题
      function toggleTheme() {
        // 切换主题
        if (currentTheme === "white") {
          currentTheme = "yellow";
        } else if (currentTheme === "yellow") {
          currentTheme = "night";
        } else {
          currentTheme = "white";
        }

        // 应用主题
        applyTheme();

        // 保存主题设置
        localStorage.setItem("novel_theme", currentTheme);
      }

      // 应用主题样式
      function applyTheme() {
        readContentEl.className = `read-content theme-${currentTheme}`;
        document.body.style.backgroundColor =
          currentTheme === "night" ? "#1a1a1a" : "#f9f7f8";
      }

      // 恢复主题设置
      function restoreThemeSetting() {
        const savedTheme = localStorage.getItem("novel_theme");
        if (savedTheme) {
          currentTheme = savedTheme;
          applyTheme();
        }

        // 恢复字体大小
        const savedFontSize = localStorage.getItem(
          `novel_fontsize_${currentBookId}`,
        );
        if (savedFontSize) {
          currentFontSize = parseInt(savedFontSize);
          contentEl.style.fontSize = `${currentFontSize}px`;
        }
      }

      // 显示目录
      function showCatalog() {
        catalogModalEl.classList.add("show");
      }

      // 隐藏目录
      function hideCatalog() {
        catalogModalEl.classList.remove("show");
      }

      // 记录阅读进度
      function recordReadingProgress() {
        const scrollEl = contentEl.parentElement;
        const scrollTop = scrollEl.scrollTop;
        const scrollHeight = scrollEl.scrollHeight - scrollEl.clientHeight;
        const progress =
          scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;

        // 保存进度
        const progressData = {
          chapter: currentChapter,
          scrollPercent: progress,
          timestamp: new Date().getTime(),
        };
        localStorage.setItem(
          `novel_progress_${currentBookId}`,
          JSON.stringify(progressData),
        );

        // 显示进度提示
        showProgressTip(`已阅读至 ${Math.round(progress)}%`);
      }

      // 恢复阅读进度
      function restoreReadingProgress() {
        const savedProgress = localStorage.getItem(
          `novel_progress_${currentBookId}`,
        );
        if (savedProgress) {
          const progressData = JSON.parse(savedProgress);
          currentChapter = progressData.chapter;

          // 渲染章节后恢复滚动位置
          setTimeout(() => {
            const scrollEl = contentEl.parentElement;
            const scrollHeight = scrollEl.scrollHeight - scrollEl.clientHeight;
            const scrollTop = (progressData.scrollPercent / 100) * scrollHeight;
            scrollEl.scrollTop = scrollTop;

            showProgressTip(
              `恢复阅读进度：${Math.round(progressData.scrollPercent)}%`,
            );
          }, 100);
        }
      }

      // 显示进度提示
      function showProgressTip(text) {
        progressTipEl.textContent = text;
        progressTipEl.style.display = "block";

        setTimeout(() => {
          progressTipEl.style.display = "none";
        }, 1500);
      }

      // 防抖函数
      function debounce(func, wait) {
        let timeout;
        return function (...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }
    </script>
  </body>
</html>
