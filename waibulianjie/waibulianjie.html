<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的收藏夹 | 温柔紫调</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #c8a2c8; /* 淡紫主色 */
        --secondary: #e8c8e8; /* 浅紫辅色 */
        --light-pink: #f5e6f5; /* 淡粉 */
        --cream: #faf6fa; /* 奶白 */
        --dark-purple: #8b6d8b; /* 深紫（文字） */
        --gray: #9d8b9d; /* 浅灰（辅助文字） */
        --shadow: rgba(200, 162, 200, 0.2); /* 柔和阴影 */
      }

      body {
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background-color: var(--cream);
        color: var(--dark-purple);
        line-height: 1.6;
        padding-bottom: 50px;
      }

      /* 头部样式（温柔紫调） */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background-color: var(--cream);
        border-bottom: 2px solid var(--secondary);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 10px var(--shadow);
      }

      .header__icon {
        font-size: 2rem;
        color: var(--primary);
      }

      .header__title {
        text-align: center;
        line-height: 1.2;
      }

      .header__title-line1 {
        font-size: 1.8rem;
        color: var(--dark-purple);
        display: block;
      }

      .header__title-line2 {
        font-size: 1.2rem;
        color: var(--primary);
        display: block;
      }

      .back-btn {
        background-color: var(--primary);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 20px;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
      }

      .back-btn:hover {
        background-color: var(--dark-purple);
        transform: translateY(-2px);
      }

      /* 搜索和分类区 - 新增标签管理样式 */
      .search-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
      }

      .search-box {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      #search-input {
        flex: 1;
        padding: 0.8rem 1.2rem;
        border: 2px solid var(--secondary);
        border-radius: 20px;
        background-color: white;
        color: var(--dark-purple);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s ease;
      }

      #search-input::placeholder {
        color: var(--gray);
      }

      #search-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 8px var(--shadow);
      }

      /* 分类标签容器 - 新增添加标签的输入框区域 */
      .category-wrapper {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }

      .category-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        flex: 1;
      }

      .category-tag {
        padding: 0.5rem 1.2rem;
        border-radius: 20px;
        background-color: var(--light-pink);
        color: var(--dark-purple);
        border: 1px solid var(--secondary);
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        position: relative;
      }

      /* 非"全部"标签新增删除按钮 */
      .category-tag:not(.all-tag)::after {
        content: "×";
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.7rem;
        color: var(--gray);
        margin-left: 4px;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .category-tag:not(.all-tag):hover::after {
        opacity: 1;
        color: #c86d6d;
      }

      .category-tag.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
      }

      .category-tag:hover {
        background-color: var(--secondary);
        color: white;
        transform: translateY(-2px);
      }

      /* 新增标签输入框样式 */
      .add-category-box {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      #new-category-input {
        padding: 0.5rem 1rem;
        border: 1px solid var(--secondary);
        border-radius: 20px;
        outline: none;
        color: var(--dark-purple);
        width: 120px;
      }

      #new-category-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 8px var(--shadow);
      }

      .add-category-btn {
        padding: 0.5rem 1rem;
        border-radius: 20px;
        background-color: var(--primary);
        color: white;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .add-category-btn:hover {
        background-color: var(--dark-purple);
        transform: translateY(-2px);
      }

      /* 链接卡片容器 */
      .links-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.8rem;
      }

      /* 链接卡片样式（温柔圆角） */
      .link-card {
        background-color: white;
        border-radius: 16px;
        padding: 1.5rem;
        border: 1px solid var(--secondary);
        box-shadow: 0 4px 15px var(--shadow);
        transition: all 0.3s ease;
      }

      .link-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px var(--shadow);
        border-color: var(--primary);
      }

      .link-card__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .link-card__title {
        font-size: 1.2rem;
        color: var(--dark-purple);
        font-weight: 600;
      }

      .link-card__tag {
        padding: 0.2rem 0.6rem;
        border-radius: 10px;
        background-color: var(--light-pink);
        color: var(--primary);
        font-size: 0.8rem;
      }

      .link-card__url {
        color: var(--gray);
        font-size: 0.9rem;
        margin-bottom: 1rem;
        word-break: break-all;
      }

      .link-card__desc {
        color: var(--dark-purple);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 1.2rem;
      }

      .link-card__action {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .link-btn {
        padding: 0.5rem 1rem;
        background-color: var(--light-pink);
        color: var(--dark-purple);
        text-decoration: none;
        border-radius: 10px;
        font-size: 0.9rem;
        transition: all 0.3s ease;
      }

      .link-btn:hover {
        background-color: var(--primary);
        color: white;
      }

      .link-delete {
        padding: 0.5rem 0.8rem;
        background-color: #ffe6e6;
        color: #c86d6d;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .link-delete:hover {
        background-color: #f8d8d8;
      }

      /* 新增链接按钮 */
      .add-link-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: var(--primary);
        color: white;
        font-size: 2rem;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 15px var(--shadow);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .add-link-btn:hover {
        background-color: var(--dark-purple);
        transform: scale(1.1);
      }

      /* 弹窗遮罩 */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-overlay.active {
        display: flex;
      }

      /* 弹窗内容 */
      .modal {
        background: var(--cream);
        padding: 2rem;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(200, 162, 200, 0.3);
        border: 1px solid var(--secondary);
      }

      .modal h3 {
        color: var(--dark-purple);
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        color: var(--dark-purple);
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid var(--secondary);
        border-radius: 10px;
        background: white;
        color: var(--dark-purple);
        outline: none;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 8px var(--shadow);
      }

      .modal-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
        margin-top: 1.5rem;
      }

      .btn-cancel,
      .btn-confirm {
        padding: 0.6rem 1.5rem;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .btn-cancel {
        background: var(--light-pink);
        color: var(--dark-purple);
      }

      .btn-cancel:hover {
        background: var(--secondary);
      }

      .btn-confirm {
        background: var(--primary);
        color: white;
      }

      .btn-confirm:hover {
        background: var(--dark-purple);
      }

      /* 响应式适配 */
      @media (max-width: 768px) {
        .header {
          padding: 1rem;
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }

        .search-container {
          margin: 1.5rem auto;
          padding: 0 1rem;
        }

        .category-wrapper {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.8rem;
        }

        .add-category-box {
          width: 100%;
        }

        #new-category-input {
          flex: 1;
          width: auto;
        }

        .links-container {
          padding: 0 1rem;
          grid-template-columns: 1fr;
        }

        .add-link-btn {
          width: 50px;
          height: 50px;
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- 头部 -->
    <header class="header" id="header">
      <div class="header__icon">🔮</div>
      <h1 class="header__title">
        <span class="header__title-line1">我的收藏夹</span>
        <span class="header__title-line2">温柔紫调 · 美好链接</span>
      </h1>
      <a href="../index.html" class="back-btn" title="返回首页">🏠 首页</a>
    </header>

    <!-- 搜索和分类 - 改造分类区，新增标签管理 -->
    <div class="search-container">
      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="搜索链接名称/描述..."
        />
      </div>
      <!-- 新增分类包装器，包含标签和新增标签输入框 -->
      <div class="category-wrapper">
        <div class="category-tags" id="category-tags">
          <!-- 标签由JS从localStorage加载，默认显示全部 -->
          <div class="category-tag all-tag active">全部</div>
        </div>
        <!-- 新增标签输入框 -->
        <div class="add-category-box">
          <input
            type="text"
            id="new-category-input"
            placeholder="新增分类标签"
          />
          <button class="add-category-btn" id="add-category-btn">添加</button>
        </div>
      </div>
    </div>

    <!-- 链接卡片容器 -->
    <div class="links-container" id="links-container">
      <!-- 内容由JS从localStorage加载 -->
    </div>

    <!-- 新增链接按钮 -->
    <button class="add-link-btn">+</button>

    <!-- 添加链接弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h3>添加新链接</h3>
        <div class="form-group">
          <label>链接名称</label>
          <input type="text" id="link-title" placeholder="例如：MDN 文档" />
        </div>
        <div class="form-group">
          <label>链接地址</label>
          <input type="url" id="link-url" placeholder="https://..." />
        </div>
        <div class="form-group">
          <label>链接描述</label>
          <textarea
            id="link-desc"
            rows="3"
            placeholder="简单描述一下这个链接..."
          ></textarea>
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="link-category">
            <!-- 分类选项由JS从localStorage加载 -->
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="btn-cancel">取消</button>
          <button class="btn-confirm" id="btn-confirm">添加</button>
        </div>
      </div>
    </div>

    <script>
      // ========== 本地存储KEY定义 ==========
      const STORAGE_KEY_LINKS = "my_links_collection"; // 链接数据
      const STORAGE_KEY_CATEGORIES = "my_link_categories"; // 分类标签数据

      // ========== 分类标签核心逻辑 ==========
      // 1. 获取所有分类标签（本地存储）
      function getCategories() {
        const data = localStorage.getItem(STORAGE_KEY_CATEGORIES);
        // 默认分类：学习、工具、娱乐、设计、生活
        return data
          ? JSON.parse(data)
          : ["学习", "工具", "娱乐", "设计", "生活"];
      }

      // 2. 保存分类标签到本地存储
      function saveCategories(categories) {
        localStorage.setItem(
          STORAGE_KEY_CATEGORIES,
          JSON.stringify(categories),
        );
      }

      // 3. 渲染分类标签到页面
      function renderCategories() {
        const tagsContainer = document.getElementById("category-tags");
        // 保留"全部"标签，清空其他
        const allTag = tagsContainer.querySelector(".all-tag");
        tagsContainer.innerHTML = "";
        tagsContainer.appendChild(allTag);
        allTag.classList.add("active");

        // 渲染自定义分类标签
        const categories = getCategories();
        categories.forEach((category) => {
          const tag = document.createElement("div");
          tag.className = "category-tag";
          tag.textContent = category;
          tag.dataset.category = category;
          tagsContainer.appendChild(tag);
        });

        // 重新绑定分类筛选事件
        bindCategoryFilter();
        // 绑定标签删除事件
        bindCategoryDelete();
        // 更新添加链接弹窗的分类下拉框
        updateCategorySelect();
      }

      // 4. 添加新分类标签
      function addCategory(newCategory) {
        if (!newCategory || newCategory.trim() === "") {
          alert("分类标签不能为空！");
          return;
        }
        const categories = getCategories();
        if (categories.includes(newCategory)) {
          alert("该分类标签已存在！");
          return;
        }
        categories.push(newCategory);
        saveCategories(categories);
        renderCategories();
        // 清空输入框
        document.getElementById("new-category-input").value = "";
      }

      // 5. 删除分类标签
      function deleteCategory(delCategory) {
        // 确认删除（如果有链接使用该分类，提示）
        const links = getLinks();
        const hasLink = links.some((link) => link.category === delCategory);
        if (hasLink) {
          if (
            !confirm(
              `该分类下还有链接，删除后这些链接的分类会变为"未分类"，确定要删除吗？`,
            )
          ) {
            return;
          }
          // 将该分类下的链接改为"未分类"
          const newLinks = links.map((link) => {
            if (link.category === delCategory) {
              return { ...link, category: "未分类" };
            }
            return link;
          });
          saveLinks(newLinks);
          renderLinks();
        }

        // 删除分类标签
        const categories = getCategories();
        const newCategories = categories.filter((c) => c !== delCategory);
        saveCategories(newCategories);
        renderCategories();
      }

      // 6. 更新添加链接弹窗的分类下拉框
      function updateCategorySelect() {
        const select = document.getElementById("link-category");
        select.innerHTML = "";
        const categories = getCategories();
        // 先添加"未分类"（兜底）
        const unclassified = document.createElement("option");
        unclassified.value = "未分类";
        unclassified.textContent = "未分类";
        select.appendChild(unclassified);
        // 添加自定义分类
        categories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          select.appendChild(option);
        });
      }

      // 7. 绑定分类标签删除事件（点击×删除）
      function bindCategoryDelete() {
        const categoryTags = document.querySelectorAll(
          ".category-tag:not(.all-tag)",
        );
        categoryTags.forEach((tag) => {
          tag.addEventListener("click", function (e) {
            // 点击×（伪元素）时触发删除，点击标签主体触发筛选
            const targetX = e.clientX;
            const tagRect = this.getBoundingClientRect();
            const xBtnArea = tagRect.right - 20; // ×按钮区域（右侧20px）

            if (targetX >= xBtnArea) {
              e.stopPropagation(); // 阻止触发筛选
              deleteCategory(this.dataset.category);
            }
          });
        });
      }

      // ========== 链接核心逻辑（保留原有，微调） ==========
      // 1. 从localStorage读取链接
      function getLinks() {
        const data = localStorage.getItem(STORAGE_KEY_LINKS);
        return data ? JSON.parse(data) : [];
      }

      // 2. 保存链接到localStorage
      function saveLinks(links) {
        localStorage.setItem(STORAGE_KEY_LINKS, JSON.stringify(links));
      }

      // 3. 渲染所有链接到页面
      function renderLinks() {
        const container = document.getElementById("links-container");
        container.innerHTML = ""; // 清空旧内容

        const links = getLinks();
        if (links.length === 0) {
          container.innerHTML =
            '<p style="text-align:center; color:var(--gray); grid-column:1/-1; padding:2rem;">暂无收藏链接，点击右下角「+」添加吧～</p>';
          return;
        }

        links.forEach((link, index) => {
          const card = document.createElement("div");
          card.className = "link-card";
          card.dataset.category = link.category;
          card.dataset.index = index; // 用于删除

          card.innerHTML = `
          <div class="link-card__header">
            <h3 class="link-card__title">${link.title}</h3>
            <span class="link-card__tag">${link.category}</span>
          </div>
          <div class="link-card__url">${link.url}</div>
          <div class="link-card__desc">${link.desc || "无描述"}</div>
          <div class="link-card__action">
            <a href="${link.url}" class="link-btn" target="_blank">访问链接</a>
            <button class="link-delete" data-index="${index}">删除</button>
          </div>
        `;
          container.appendChild(card);
        });

        // 绑定删除事件
        document.querySelectorAll(".link-delete").forEach((btn) => {
          btn.addEventListener("click", function () {
            const idx = parseInt(this.dataset.index);
            if (confirm("确定要删除这个链接吗？")) {
              deleteLink(idx);
            }
          });
        });
      }

      // 4. 添加新链接
      function addLink(link) {
        const links = getLinks();
        links.unshift(link); // 新链接放最前面
        saveLinks(links);
        renderLinks();
      }

      // 5. 删除链接
      function deleteLink(index) {
        const links = getLinks();
        links.splice(index, 1);
        saveLinks(links);
        renderLinks();
      }

      // ========== 分类筛选逻辑 ==========
      function bindCategoryFilter() {
        const categoryTags = document.querySelectorAll(".category-tag");
        categoryTags.forEach((tag) => {
          tag.addEventListener("click", function () {
            categoryTags.forEach((t) => t.classList.remove("active"));
            this.classList.add("active");

            const category = this.textContent;
            const allCards = document.querySelectorAll(".link-card");
            allCards.forEach((card) => {
              if (category === "全部" || card.dataset.category === category) {
                card.style.display = "block";
              } else {
                card.style.display = "none";
              }
            });
          });
        });
      }

      // ========== 页面初始化 ==========
      document.addEventListener("DOMContentLoaded", function () {
        // 初始化分类标签和链接
        renderCategories();
        renderLinks();

        // ========== 搜索功能（保留原有） ==========
        const searchInput = document.getElementById("search-input");
        searchInput.addEventListener("input", function () {
          const searchText = this.value.toLowerCase().trim();
          const allCards = document.querySelectorAll(".link-card");
          allCards.forEach((card) => {
            const title = card
              .querySelector(".link-card__title")
              .textContent.toLowerCase();
            const desc = card
              .querySelector(".link-card__desc")
              .textContent.toLowerCase();
            const url = card
              .querySelector(".link-card__url")
              .textContent.toLowerCase();

            if (
              title.includes(searchText) ||
              desc.includes(searchText) ||
              url.includes(searchText)
            ) {
              card.style.display = "block";
            } else {
              card.style.display = "none";
            }
          });
        });

        // ========== 绑定新增分类标签事件 ==========
        const addCategoryBtn = document.getElementById("add-category-btn");
        const newCategoryInput = document.getElementById("new-category-input");
        addCategoryBtn.addEventListener("click", function () {
          addCategory(newCategoryInput.value.trim());
        });
        // 按回车添加分类
        newCategoryInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            addCategory(this.value.trim());
          }
        });

        // ========== 弹窗功能（保留原有） ==========
        const addLinkBtn = document.querySelector(".add-link-btn");
        const modalOverlay = document.getElementById("modal-overlay");
        const btnCancel = document.getElementById("btn-cancel");
        const btnConfirm = document.getElementById("btn-confirm");

        // 打开弹窗
        addLinkBtn.addEventListener("click", () => {
          modalOverlay.classList.add("active");
        });

        // 关闭弹窗
        function closeModal() {
          modalOverlay.classList.remove("active");
          document.getElementById("link-title").value = "";
          document.getElementById("link-url").value = "";
          document.getElementById("link-desc").value = "";
        }

        btnCancel.addEventListener("click", closeModal);
        modalOverlay.addEventListener("click", (e) => {
          if (e.target === modalOverlay) closeModal();
        });

        // 确认添加链接
        btnConfirm.addEventListener("click", () => {
          const title = document.getElementById("link-title").value.trim();
          const url = document.getElementById("link-url").value.trim();
          const desc = document.getElementById("link-desc").value.trim();
          const category = document.getElementById("link-category").value;

          if (!title) {
            alert("链接名称不能为空！");
            return;
          }
          if (!url) {
            alert("链接地址不能为空！");
            return;
          }
          if (!url.startsWith("http://") && !url.startsWith("https://")) {
            alert("链接地址请以 http:// 或 https:// 开头！");
            return;
          }

          addLink({ title, url, desc, category });
          closeModal();
          alert("链接添加成功！");
        });
      });
    </script>
  </body>
</html>
