<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>动漫 - 小汤圆的快乐小屋</title>
    <style>
      /* 全局样式和小说/音乐页统一 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        border: none !important;
      }
      body {
        background-color: #f9f7f8;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        display: flex;
        min-height: 100vh;
      }
      /* 侧边栏 */
      .cebian {
        width: 200px;
        background-color: #ffffff;
        border: 1px solid #e8e2e9 !important;
        border-radius: 12px !important;
        margin: 10px;
        padding: 16px;
        box-shadow: rgba(146, 119, 161, 0.08) 0px 2px 8px !important;
      }
      .avatar-box {
        display: flex;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid #e8e2e9 !important;
        margin-bottom: 16px;
      }
      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        background-color: #f3edf7;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7c3aed;
        font-size: 18px;
      }
      .nickname {
        margin-left: 12px;
        font-size: 18px;
        color: #5a4b60;
        font-weight: 500;
      }
      .nav-list {
        list-style: none;
      }
      .nav-item {
        margin-bottom: 8px;
      }
      .nav-link {
        display: block;
        padding: 12px 16px;
        text-decoration: none;
        color: #5a4b60;
        font-size: 16px;
        border-radius: 8px !important;
        text-align: center;
        transition: all 0.2s ease;
      }
      .nav-link.active {
        background-color: #ede9fe !important;
        color: #7c3aed !important;
        font-weight: 500;
      }
      .nav-link:hover {
        background-color: #f3edf7 !important;
        color: #8b5cf6 !important;
      }
      /* 主内容区 */
      .main-content {
        flex: 1;
        margin: 10px;
        padding: 20px;
      }
      /* 上传区域 */
      .upload-box {
        background-color: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: rgba(146, 119, 161, 0.08) 0px 2px 8px !important;
        margin-bottom: 20px;
      }
      .upload-title {
        font-size: 20px;
        color: #7c3aed;
        margin-bottom: 16px;
      }
      .form-item {
        margin-bottom: 12px;
      }
      .form-label {
        display: block;
        margin-bottom: 4px;
        color: #5a4b60;
        font-size: 14px;
      }
      input[type="text"],
      textarea {
        width: 300px;
        padding: 8px;
        border: 1px solid #e8e2e9 !important;
        border-radius: 6px;
      }
      textarea {
        height: 80px;
        resize: none;
      }
      .upload-btn {
        padding: 8px 20px;
        background-color: #7c3aed;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        border: none;
      }
      .message-box {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        display: none;
      }
      .message-box.success {
        background-color: #dcfce7;
        color: #16a34a;
        display: block;
      }
      .message-box.error {
        background-color: #fee2e2;
        color: #dc2626;
        display: block;
      }
      /* 动漫列表 */
      .anime-list {
        background-color: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: rgba(146, 119, 161, 0.08) 0px 2px 8px !important;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      .list-title {
        grid-column: 1 / -1;
        font-size: 20px;
        color: #7c3aed;
        margin-bottom: 16px;
      }
      .anime-card {
        background-color: #f9f7f8;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 2px 4px;
        transition: transform 0.2s ease;
      }
      .anime-card:hover {
        transform: translateY(-5px);
      }
      .anime-cover {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }
      .anime-info {
        padding: 12px;
      }
      .anime-title {
        font-size: 16px;
        color: #4a3f4d;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .anime-desc {
        font-size: 12px;
        color: #917899;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .anime-actions {
        display: flex;
        justify-content: space-between;
      }
      .detail-btn,
      .delete-btn {
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        border: none;
        text-decoration: none;
      }
      .detail-btn {
        background-color: #ede9fe;
        color: #7c3aed;
      }
      .delete-btn {
        background-color: #fee2e2;
        color: #dc2626;
      }
      .empty-tip {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px;
        color: #917899;
      }
    </style>
  </head>
  <body>
    <!-- 侧边栏 -->
    <div class="cebian">
      <div class="avatar-box">
        <div class="avatar">汤</div>
        <div class="nickname">小汤圆</div>
      </div>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="../index.html" class="nav-link">首页</a>
        </li>
        <li class="nav-item">
          <a href="../novel/novel.html" class="nav-link">小说</a>
        </li>
        <li class="nav-item">
          <a href="../music/music.html" class="nav-link">音乐</a>
        </li>
        <li class="nav-item">
          <a href="./anime.html" class="nav-link active">动漫</a>
        </li>
        <li class="nav-item">
          <a href="../video/video.html" class="nav-link">视频</a>
        </li>
      </ul>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 上传区域 -->
      <div class="upload-box">
        <h3 class="upload-title">上传动漫</h3>
        <div class="form-item">
          <label class="form-label">动漫名称：</label>
          <input type="text" id="animeTitle" placeholder="例如：火影忍者" />
        </div>
        <div class="form-item">
          <label class="form-label">动漫简介：</label>
          <textarea
            id="animeDesc"
            placeholder="简单介绍一下这部动漫..."
          ></textarea>
        </div>
        <div class="form-item">
          <label class="form-label">选择封面图片：</label>
          <input type="file" id="coverFile" accept=".jpg,.jpeg,.png,.webp" />
        </div>
        <button class="upload-btn" onclick="uploadAnime()">上传</button>
        <div id="uploadMessage" class="message-box"></div>
      </div>

      <!-- 动漫列表 -->
      <div class="anime-list">
        <h3 class="list-title">我的动漫库</h3>
        <div id="animeList">
          <div class="empty-tip">加载中...</div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:5000/api/anime";
      const uploadMessageEl = document.getElementById("uploadMessage");
      const animeListEl = document.getElementById("animeList");

      // 页面加载获取动漫列表
      window.onload = loadAnimeList;

      // 加载动漫列表
      async function loadAnimeList() {
        try {
          const res = await fetch(`${API_BASE}/list`);
          const result = await res.json();

          if (result.success && result.data.length > 0) {
            let html = "";
            result.data.forEach((anime) => {
              html += `
              <div class="anime-card">
                <img src="${API_BASE}/cover/${anime.id}" alt="${anime.title}" class="anime-cover" onerror="this.src='https://via.placeholder.com/200x250?text=暂无封面'">
                <div class="anime-info">
                  <div class="anime-title">${anime.title}</div>
                  <div class="anime-desc">${anime.desc}</div>
                  <div class="anime-actions">
                    <a href="./detail.html?id=${anime.id}" class="detail-btn">详情</a>
                    <button class="delete-btn" onclick="deleteAnime(${anime.id})">删除</button>
                  </div>
                </div>
              </div>
            `;
            });
            animeListEl.innerHTML = html;
          } else {
            animeListEl.innerHTML =
              '<div class="empty-tip">暂无动漫，快去上传吧～</div>';
          }
        } catch (err) {
          animeListEl.innerHTML = `<div class="empty-tip">❌ 加载失败：${err.message}</div>`;
        }
      }

      // 上传动漫
      async function uploadAnime() {
        const title = document.getElementById("animeTitle").value.trim();
        const desc = document.getElementById("animeDesc").value.trim();
        const file = document.getElementById("coverFile").files[0];

        if (!title) {
          showMessage("请输入动漫名称！", "error");
          return;
        }
        if (!file) {
          showMessage("请选择封面图片！", "error");
          return;
        }

        const formData = new FormData();
        formData.append("title", title);
        formData.append("desc", desc);
        formData.append("coverFile", file);

        try {
          const res = await fetch(`${API_BASE}/upload`, {
            method: "POST",
            body: formData,
          });
          const result = await res.json();

          if (result.success) {
            showMessage(result.message, "success");
            // 清空输入框
            document.getElementById("animeTitle").value = "";
            document.getElementById("animeDesc").value = "";
            document.getElementById("coverFile").value = "";
            // 重新加载列表
            loadAnimeList();
          } else {
            showMessage(result.message, "error");
          }
        } catch (err) {
          showMessage("上传失败：" + err.message, "error");
        }
      }

      // 删除动漫
      async function deleteAnime(id) {
        if (!confirm("确定要删除这部动漫吗？删除后无法恢复！")) return;

        try {
          const res = await fetch(`${API_BASE}/delete/${id}`, {
            method: "DELETE",
          });
          const result = await res.json();

          if (result.success) {
            alert(result.message);
            loadAnimeList();
          } else {
            alert(result.message);
          }
        } catch (err) {
          alert("删除失败：" + err.message);
        }
      }

      // 显示提示信息
      function showMessage(text, type) {
        uploadMessageEl.textContent = text;
        uploadMessageEl.className = `message-box ${type}`;
        setTimeout(() => {
          uploadMessageEl.className = "message-box";
        }, 3000);
      }
    </script>
  </body>
</html>
